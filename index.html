<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CIS ITSM Exam</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <h1>CIS ITSM ServiceNow Exam</h1>

    <!-- HOME SCREEN -->
    <div id="home-screen">

      <div class="hero-card">
        <h2>Select Topic</h2>
        <p>
          Practice your ServiceNow CIS ITSM certification with modern interactive quizzes.
        </p>
      </div>

      <div class="topics">

        <button onclick="startQuiz('incident')">
          Incident Management
        </button>

        <button onclick="startQuiz('problem')">
          Problem Management
        </button>

        <button onclick="startQuiz('change')">
          Change Management
        </button>

        <button onclick="startQuiz('spm')">
          SPM
        </button>

        <button onclick="startQuiz('cmdb')">
          CMDB
        </button>

        <button onclick="startQuiz('service-catalog')">
          Service Catalog
        </button>

        <button onclick="startQuiz('all')">
          ALL TOPICS
        </button>

      </div>

    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="hidden">

      <div class="quiz-topbar">

        <div>
          <div id="question-counter"></div>
          <div id="question-topic" class="topic-badge"></div>
        </div>

        <div id="score" class="score-pill"></div>

      </div>

      <div class="progress-bar">
        <div id="progress"></div>
      </div>

      <div class="question-card">

        <div id="question-type"></div>

        <h2 id="question"></h2>

        <div id="options"></div>

      </div>

      <div class="quiz-actions">

        <button id="next-btn">
          Next Question
        </button>

        <button id="home-btn" class="secondary-btn">
          Back Home
        </button>

      </div>

    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden">

      <div class="result-header">

        <h2>Quiz Finished</h2>

        <h3 id="final-score"></h3>

        <button class="secondary-btn" onclick="goHome()">
          Back Home
        </button>

      </div>

      <div id="results-review"></div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
