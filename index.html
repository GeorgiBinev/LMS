<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIS ITSM Exam</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>CIS ITSM ServiceNow Exam</h1>

    <div id="home-screen">
      <h2>Select Topic</h2>

      <div class="topics">
        <button onclick="startQuiz('incident')">Incident Management</button>
        <button onclick="startQuiz('problem')">Problem Management</button>
        <button onclick="startQuiz('change')">Change Management</button>
        <button onclick="startQuiz('spm')">SPM</button>
        <button onclick="startQuiz('cmdb')">CMDB</button>
        <button onclick="startQuiz('service-catalog')">Service Catalog</button>
        <button onclick="startQuiz('all')">ALL</button>
      </div>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="quiz-header">
        <span id="question-counter"></span>
        <span id="score"></span>
      </div>

      <div class="progress-bar">
        <div id="progress"></div>
      </div>

      <h2 id="question"></h2>

      <div id="question-type"></div>

      <div id="options"></div>

      <button id="next-btn">Next Question</button>
    </div>

    <div id="result-screen" class="hidden">
      <h2>Quiz Finished</h2>
      <h3 id="final-score"></h3>

      <div id="results-review"></div>

      <button onclick="goHome()">Back Home</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
